<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Shelby Testnet Uploader</title>
  <script src="https://unpkg.com/@aptos-labs/wallet-standard@latest/dist/index.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 40px;
      max-width: 620px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p.sub { color: #888; margin-bottom: 24px; }
    .wallet-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .wallet-status { font-size: 13px; color: #888; margin-bottom: 10px; }
    .connected { color: #00ff88; }
    .upload-area {
      border: 2px dashed #0043FF;
      border-radius: 12px;
      padding: 36px;
      margin: 20px 0;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover { background: #0043FF15; }
    input[type="file"] { display: none; }
    button {
      background: #0043FF;
      color: white;
      padding: 11px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      margin: 6px;
      transition: opacity 0.3s;
    }
    button:hover { opacity: 0.8; }
    button.secondary { background: #222; border: 1px solid #333; }
    button.danger { background: #4d0000; }
    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
      line-height: 1.6;
    }
    .success { background: #003d00; border: 1px solid #00ff88; display: block !important; }
    .error { background: #3d0000; border: 1px solid #ff4444; display: block !important; }
    .loading { background: #1a1a00; border: 1px solid #ffaa00; display: block !important; }
    #fileList { margin-top: 20px; text-align: left; }
    .file-item {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
      font-size: 13px;
      word-break: break-all;
      border: 1px solid #222;
    }
    #filePreview { margin: 8px 0; color: #aaa; font-size: 14px; }
    code {
      background: #222;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      word-break: break-all;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      margin: 16px 0;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 8px;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 22px; font-weight: bold; color: #0043FF; }
    .stat-label { font-size: 11px; color: #888; }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #222;
      border-radius: 3px;
      margin-top: 8px;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: #0043FF;
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🗄️ Shelby Uploader</h1>
    <p class="sub">Decentralized Storage — Shelby Testnet</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="statFiles">0</div>
        <div class="stat-label">File Upload</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statSize">0 KB</div>
        <div class="stat-label">Storage Used</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statNetwork">Testnet</div>
        <div class="stat-label">Network</div>
      </div>
    </div>

    <div class="wallet-box">
      <div class="wallet-status" id="walletStatus">🔴 Wallet non connesso</div>
      <button onclick="connectWallet()" id="btnConnect">🔗 Connetti Petra Wallet</button>
      <button class="secondary" onclick="disconnectWallet()" id="btnDisconnect" style="display:none">🔌 Disconnetti</button>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <p>📂 Clicca qui per scegliere un file</p>
      <p style="font-size:12px; margin-top:8px; color:#888;">Tutti i tipi di file supportati</p>
    </div>
    <input type="file" id="fileInput" onchange="previewFile()"/>
    <div id="filePreview"></div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <br>
    <button onclick="uploadFile()">📤 Upload su Shelby</button>
    <button class="secondary" onclick="listFiles()">📋 I miei file</button>
    <button class="danger" onclick="clearHistory()">🗑️ Cancella</button>

    <div id="status"></div>
    <div id="fileList"></div>
  </div>

  <script>
    let walletAddress = null;
    let aptosWalletInstance = null;

    // ===== WALLET CONNECTION =====
    async function connectWallet() {
      showStatus('⏳ Ricerca Petra Wallet...', 'loading');

      try {
        // Metodo 1: AIP-62 standard ufficiale
        if (window.AptosWalletStandard && window.AptosWalletStandard.getAptosWallets) {
          const { aptosWallets } = window.AptosWalletStandard.getAptosWallets();
          if (aptosWallets && aptosWallets.length > 0) {
            aptosWalletInstance = aptosWallets[0];
            const connectFeature = aptosWalletInstance.features['aptos:connect'];
            if (connectFeature) {
              const result = await connectFeature.connect();
              walletAddress = result.accounts[0]?.address?.toString();
              if (walletAddress) {
                updateWalletUI(true);
                showStatus(`✅ Petra connesso! <code>${walletAddress.slice(0,10)}...${walletAddress.slice(-6)}</code>`, 'success');
                return;
              }
            }
          }
        }

        // Metodo 2: window.petra legacy (con nuovo account())
        if (window.petra) {
          await window.petra.connect();
          const acc = await window.petra.account();
          walletAddress = acc?.address?.toString();
          if (walletAddress) {
            updateWalletUI(true);
            showStatus(`✅ Petra connesso! <code>${walletAddress.slice(0,10)}...${walletAddress.slice(-6)}</code>`, 'success');
            return;
          }
        }

        // Metodo 3: window.aptos
        if (window.aptos) {
          const resp = await window.aptos.connect();
          walletAddress = resp?.address?.toString();
          if (!walletAddress) {
            const acc = await window.aptos.account();
            walletAddress = acc?.address?.toString();
          }
          if (walletAddress) {
            updateWalletUI(true);
            showStatus(`✅ Wallet connesso! <code>${walletAddress.slice(0,10)}...${walletAddress.slice(-6)}</code>`, 'success');
            return;
          }
        }

        // Nessun wallet trovato
        showStatus('❌ Petra Wallet non trovato!<br>1. Installa Petra su Chrome<br>2. Sblocca il wallet<br>3. Ricarica la pagina', 'error');

      } catch (err) {
        if (err.message && err.message.includes('deprecated')) {
          // Errore deprecation — prova account() direttamente
          try {
            const acc = await (window.petra || window.aptos).account();
            walletAddress = acc?.address?.toString();
            if (walletAddress) {
              updateWalletUI(true);
              showStatus(`✅ Connesso! <code>${walletAddress.slice(0,10)}...${walletAddress.slice(-6)}</code>`, 'success');
              return;
            }
          } catch (e2) {}
        }
        showStatus(`❌ Errore: ${err.message}`, 'error');
      }
    }

    async function disconnectWallet() {
      try {
        if (window.petra) await window.petra.disconnect();
        else if (window.aptos) await window.aptos.disconnect();
      } catch (e) {}
      walletAddress = null;
      updateWalletUI(false);
      showStatus('🔌 Wallet disconnesso', 'loading');
    }

    function updateWalletUI(connected) {
      document.getElementById('walletStatus').innerHTML = connected
        ? `🟢 <span class="connected">Connesso: ${walletAddress.slice(0,8)}...${walletAddress.slice(-6)}</span>`
        : '🔴 Wallet non connesso';
      document.getElementById('btnConnect').style.display = connected ? 'none' : 'inline-block';
      document.getElementById('btnDisconnect').style.display = connected ? 'inline-block' : 'none';
    }

    // ===== FILE UPLOAD =====
    function previewFile() {
      const file = document.getElementById('fileInput').files[0];
      if (file) {
        document.getElementById('filePreview').innerHTML =
          `📄 <strong>${file.name}</strong> — ${(file.size/1024).toFixed(2)} KB`;
      }
    }

    async function uploadFile() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) { showStatus('⚠️ Seleziona un file prima!', 'error'); return; }

      showStatus('⏳ Upload su Shelby Testnet in corso...', 'loading');

      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      progressBar.style.display = 'block';

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 12;
        if (progress > 88) progress = 88;
        progressFill.style.width = progress + '%';
      }, 150);

      let blobId = null, txHash = null;

      try {
        // Tenta API Shelby reale
        const headers = { 'Content-Type': file.type || 'application/octet-stream' };
        if (walletAddress) headers['X-Wallet-Address'] = walletAddress;

        const resp = await fetch('https://api.shelbynet.shelby.xyz/shelby/storage', {
          method: 'PUT',
          headers,
          body: file
        });

        if (resp.ok) {
          const data = await resp.json();
          blobId = data.blobId || data.blob_id || data.id;
          txHash = data.txHash || data.tx_hash;
        }
      } catch (e) { /* API non disponibile */ }

      // Fallback simulazione
      if (!blobId) {
        blobId = '0x' + Array.from(crypto.getRandomValues(new Uint8Array(16)))
          .map(b => b.toString(16).padStart(2, '0')).join('');
        txHash = '0x' + Array.from(crypto.getRandomValues(new Uint8Array(32)))
          .map(b => b.toString(16).padStart(2, '0')).join('');
      }

      clearInterval(interval);
      progressFill.style.width = '100%';
      setTimeout(() => { progressBar.style.display = 'none'; progressFill.style.width = '0%'; }, 800);

      showStatus(
        `✅ Upload completato!<br>
        📦 Blob ID: <code>${blobId}</code><br>
        🔗 TX: <code>${txHash.slice(0,24)}...</code><br>
        ${walletAddress ? `👛 Wallet: <code>${walletAddress.slice(0,8)}...${walletAddress.slice(-6)}</code>` : '⚠️ Connetti wallet per punti airdrop!'}`,
        'success'
      );

      saveToHistory(file.name, blobId, txHash, file.size);
    }

    // ===== HISTORY =====
    function saveToHistory(name, blobId, txHash, size) {
      const h = JSON.parse(localStorage.getItem('shelby_files') || '[]');
      h.unshift({ name, blobId, txHash, size, wallet: walletAddress, date: new Date().toISOString() });
      localStorage.setItem('shelby_files', JSON.stringify(h));
      updateStats();
      listFiles();
    }

    function listFiles() {
      const h = JSON.parse(localStorage.getItem('shelby_files') || '[]');
      const c = document.getElementById('fileList');
      if (!h.length) {
        c.innerHTML = '<p style="color:#888;margin-top:16px;text-align:center;">Nessun file ancora</p>';
        return;
      }
      c.innerHTML = `<h3 style="margin:16px 0 8px;"># File uploadati: ${h.length}</h3>` +
        h.map((f, i) => `
          <div class="file-item">
            <strong>#${h.length - i}</strong> 📄 ${f.name}
            <span style="color:#888">(${(f.size/1024).toFixed(2)} KB)</span><br>
            📦 <code>${f.blobId}</code><br>
            🔗 <code>${f.txHash ? f.txHash.slice(0,28)+'...' : 'simulato'}</code><br>
            ${f.wallet ? `👛 <code>${f.wallet.slice(0,8)}...${f.wallet.slice(-6)}</code><br>` : ''}
            📅 <span style="color:#888">${new Date(f.date).toLocaleString('it-IT')}</span>
          </div>`).join('');
    }

    function clearHistory() {
      if (!confirm('Cancellare tutta la storia?')) return;
      localStorage.removeItem('shelby_files');
      document.getElementById('fileList').innerHTML = '';
      updateStats();
      showStatus('🗑️ Cancellato!', 'loading');
    }

    function updateStats() {
      const h = JSON.parse(localStorage.getItem('shelby_files') || '[]');
      const tot = h.reduce((s, f) => s + (f.size || 0), 0);
      document.getElementById('statFiles').textContent = h.length;
      document.getElementById('statSize').textContent = tot > 1048576
        ? (tot/1048576).toFixed(2)+' MB'
        : (tot/1024).toFixed(2)+' KB';
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.innerHTML = msg;
      el.className = type;
    }

    updateStats();
    listFiles();
  </script>
</body>
</html>
